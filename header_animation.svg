<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <radialGradient id="glowG" cx="20%" cy="10%" r="60%">
      <stop offset="0%" stop-color="rgba(57, 211, 83, 0.08)"/>
      <stop offset="100%" stop-color="rgba(13, 17, 23, 0.0)"/>
    </radialGradient>
    <radialGradient id="glowB" cx="80%" cy="90%" r="60%">
      <stop offset="0%" stop-color="rgba(88, 166, 255, 0.08)"/>
      <stop offset="100%" stop-color="rgba(13, 17, 23, 0.0)"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="-20%" r="50%">
      <stop offset="0%" stop-color="rgba(57, 211, 83, 0.15)"/>
      <stop offset="100%" stop-color="rgba(13, 17, 23, 0.0)"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1"/>
    </pattern>
    <clipPath id="avatarClip">
      <circle cx="400" cy="110" r="48" />
    </clipPath>
  </defs>

  <style>
    .bg { fill: #0d1117; }
    .border { stroke: rgba(255,255,255,0.06); stroke-width: 1; fill: none; }
    .name { font-family: 'Segoe UI', Arial, sans-serif; font-size: 38px; font-weight: bold; fill: #e6edf3; text-anchor: middle; }
    .dev-hi { font-family: monospace; font-size: 16px; fill: #39d353; text-anchor: middle; }
    .dev-hi-box { fill: rgba(57, 211, 83, 0.1); }
    .sub { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #8b949e; text-anchor: middle; letter-spacing: 1px; }
    
    .pulse-ring {
      fill: none;
      stroke: rgba(57, 211, 83, 0.4);
      stroke-width: 2;
      transform-origin: 400px 110px;
      animation: pulse 3s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); stroke-width: 2; opacity: 0.6; }
      50% { transform: scale(1.15); stroke-width: 4; opacity: 1; }
      100% { transform: scale(1); stroke-width: 2; opacity: 0.6; }
    }
    
    .badge-bg { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.06); rx: 12; }
    .badge-bg-green { fill: rgba(57,211,83,0.08); stroke: rgba(57,211,83,0.3); rx: 12; }
    .badge-bg-blue { fill: rgba(88,166,255,0.06); stroke: rgba(88,166,255,0.3); rx: 12; }
    
    .badge-text { font-family: monospace; font-size: 11px; text-anchor: middle; dominant-baseline: middle; fill: #8b949e; }
    .badge-text-green { fill: #39d353; font-family: monospace; font-size: 11px; text-anchor: middle; dominant-baseline: middle; }
    .badge-text-blue { fill: #58a6ff; font-family: monospace; font-size: 11px; text-anchor: middle; dominant-baseline: middle; }
  </style>

  <rect width="800" height="350" class="bg" rx="20"/>
  <rect width="800" height="350" fill="url(#grid)" rx="20"/>
  <rect width="800" height="350" fill="url(#glowG)" rx="20"/>
  <rect width="800" height="350" fill="url(#glowB)" rx="20"/>
  <circle cx="400" cy="20" r="300" fill="url(#centerGlow)"/>
  <rect width="800" height="350" class="border" rx="20"/>

  <circle cx="400" cy="110" r="50" class="pulse-ring" />
  <circle cx="400" cy="110" r="48" stroke="rgba(57, 211, 83, 0.3)" stroke-width="3" fill="none" />
  <image x="352" y="62" width="96" height="96" href="https://avatars.githubusercontent.com/u/158746099?v=4" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice" />

  <text x="400" y="210" class="name">Krishna Shakthi Eswar</text>
  
  <rect x="230" y="222" width="340" height="22" rx="6" class="dev-hi-box"/>
  <text x="400" y="237" class="dev-hi">Hello there, fellow &lt;developers/&gt;! 👋</text>
  
  <text x="400" y="270" class="sub">SOFTWARE DEVELOPER • AI ENTHUSIAST • WEB BUILDER</text>

  <g transform="translate(180, 290)">
    <rect x="0" y="0" width="115" height="24" class="badge-bg-green"/>
    <text x="57.5" y="12" class="badge-text-green">🟢 Open to Work</text>
    
    <rect x="125" y="0" width="135" height="24" class="badge-bg-blue"/>
    <text x="192.5" y="12" class="badge-text-blue">Software Developer</text>
    
    <rect x="270" y="0" width="105" height="24" class="badge-bg"/>
    <text x="322.5" y="12" class="badge-text">Web Dev and AI</text>
    
    <rect x="385" y="0" width="55" height="24" class="badge-bg"/>
    <text x="412.5" y="12" class="badge-text">India</text>
  </g>

</svg>
